<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SC Projector Screen Control</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #eee;
      padding: 2rem 1rem;
    }

    h1 {
      margin-bottom: 2.5rem;
      font-size: 1.8rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .projector-sections {
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
      width: 100%;
      max-width: 500px;
    }

    .projector-section {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 1.5rem 2rem;
    }

    .projector-section h2 {
      text-align: center;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      color: #aac4e0;
    }

    .controls {
      display: flex;
      gap: 2rem;
      justify-content: center;
    }

    .btn {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: transform 0.1s, box-shadow 0.1s, opacity 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn:active:not(:disabled) {
      transform: scale(0.95);
      box-shadow: 0 3px 10px rgba(0,0,0,0.5);
    }

    .btn-up {
      background: #0f3460;
      color: #e0e0e0;
    }

    .btn-up:hover:not(:disabled) {
      background: #16213e;
    }

    .btn-down {
      background: #533483;
      color: #e0e0e0;
    }

    .btn-down:hover:not(:disabled) {
      background: #3d2468;
    }

    .btn svg {
      width: 36px;
      height: 36px;
      fill: currentColor;
    }

    #status {
      margin-top: 2rem;
      min-height: 1.4em;
      font-size: 0.95rem;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <h1>SC Projector Screen Controls</h1>

  <div class="projector-sections">

    <!-- North Projector -->
    <div class="projector-section">
      <h2>North Screen</h2>
      <div class="controls">
        <button class="btn btn-up" id="btnNorthUp" onclick="triggerRelay('up', 'north')">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 8l-6 6 1.41 1.41L12 10.83l4.59 4.58L18 14z"/>
          </svg>
          Up
        </button>
        <button class="btn btn-down" id="btnNorthDown" onclick="triggerRelay('down', 'north')">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"/>
          </svg>
          Down
        </button>
      </div>
    </div>

    <!-- South Projector -->
    <div class="projector-section">
      <h2>South Screen</h2>
      <div class="controls">
        <button class="btn btn-up" id="btnSouthUp" onclick="triggerRelay('up2', 'south')">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 8l-6 6 1.41 1.41L12 10.83l4.59 4.58L18 14z"/>
          </svg>
          Up
        </button>
        <button class="btn btn-down" id="btnSouthDown" onclick="triggerRelay('down2', 'south')">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"/>
          </svg>
          Down
        </button>
      </div>
    </div>

  </div>

  <div id="status"></div>

  <script>
    const lockoutMs = 1200; // a bit longer than the 1-second relay pulse

    const sections = {
      north: ['btnNorthUp', 'btnNorthDown'],
      south: ['btnSouthUp', 'btnSouthDown'],
    };

    function triggerRelay(action, section) {
      const [upId, downId] = sections[section];
      const btnUp   = document.getElementById(upId);
      const btnDown = document.getElementById(downId);
      const status  = document.getElementById('status');

      btnUp.disabled   = true;
      btnDown.disabled = true;

      const label = section === 'north' ? 'North' : 'South';
      status.textContent = action.startsWith('up')
        ? `▲ Raising ${label} screen…`
        : `▼ Lowering ${label} screen…`;

      fetch('/' + action, { method: 'POST' })
        .then(r => r.json())
        .then(data => {
          status.textContent = data.status === 'ok'
            ? (action.startsWith('up')
                ? `▲ ${label} Up command sent`
                : `▼ ${label} Down command sent`)
            : 'Error: ' + JSON.stringify(data);
        })
        .catch(() => {
          status.textContent = 'Network error – check the server.';
        })
        .finally(() => {
          setTimeout(() => {
            btnUp.disabled   = false;
            btnDown.disabled = false;
          }, lockoutMs);
        });
    }
  </script>
</body>
</html>
